name: Jesse 自动化回测引擎

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许你在网页上通过按钮手动触发

jobs:
  backtest:
    runs-on: ubuntu-latest
    # Jesse 需要一个 PostgreSQL 数据库来存储 K 线数据
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: password@123
          POSTGRES_USER: jesse_user
          POSTGRES_DB: jesse_db
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: 获取仓库代码
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Jesse 及依赖库
        run: |
          pip install jesse psycopg2-binary

      - name: 初始化项目与数据库配置
        run: |
          jesse make-project quant_bot
          cd quant_bot
          # 自动修改配置文件以连接 GitHub 提供的数据库
          sed -i "s/'PASSWORD': 'password'/'PASSWORD': 'password@123'/g" config.py
          sed -i "s/'PORT': '5432'/'PORT': '5432'/g" config.py

      - name: 导入你的策略与路由
        run: |
          cd quant_bot
          # 将你写的策略复制进 Jesse 项目
          cp -r ../strategies ./
          # 配置路由：在币安永续合约的 BTC-USDT 交易对上，使用 4小时线，跑 SimpleCross 策略
          echo "from jesse.routes import router" > routes.py
          echo "router.set_routes([" >> routes.py
          echo "    ('Binance Futures', 'BTC-USDT', '4h', 'SimpleCross')" >> routes.py
          echo "])" >> routes.py

      - name: 拉取历史数据 (无需账号)
        run: |
          cd quant_bot
          # 拉取 2025年10月 到 2026年1月 的数据
          jesse import-candles 'Binance Futures' 'BTC-USDT' '2025-10-01' '2026-01-01'

      - name: 执行回测并生成报告
        run: |
          cd quant_bot
          # 运行回测，并输出漂亮的 HTML 图表和详细 JSON 报告
          jesse backtest --export-html --export-json

      - name: 上传回测结果压缩包
        uses: actions/upload-artifact@v3
        with:
          name: jesse-strategy-report
          path: |
            quant_bot/storage/html/*.html
            quant_bot/storage/json/*.json
